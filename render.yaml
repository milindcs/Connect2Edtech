services:
  - type: web
    name: connect2edtech
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && CI=false npm run build && cd ../backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: VERCEL
        value: "0"
      - key: CI
        value: "false"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: ADMIN_BOOTSTRAP_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: CORS_ORIGINS
        value: "https://connect2edtech.onrender.com,http://localhost:5173,http://localhost:10000"
    healthCheckPath: /health
